services:
  dashboard:
    build:
      context: .
    container_name: desastres-naturais-dashboard
    ports:
      - "8503:8503"
    volumes:
      - .:/app
      - /app/.venv
    environment:
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    command:
      - uv
      - run
      - streamlit
      - run
      - frontend/app.py
      - --server.address=0.0.0.0
      - --server.port=8503
